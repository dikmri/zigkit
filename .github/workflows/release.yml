name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0

      - name: Run tests
        run: zig build test --summary all

      - name: Create tarball
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          ARCHIVE="zigkit-${TAG}.tar.gz"
          git archive --format=tar.gz --prefix="zigkit-${TAG}/" HEAD > "${ARCHIVE}"
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV

      - name: Extract release notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [ -f "CHANGELOG.md" ]; then
            # Extract section for this tag
            awk "/^## \[${TAG}\]/{found=1; next} /^## \[/{found=0} found{print}" CHANGELOG.md > release_notes.md
          else
            echo "Release ${TAG}" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: ${{ env.ARCHIVE }}
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
